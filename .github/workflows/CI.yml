name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build -p chemgp-core

      - name: Test
        run: cargo test -p chemgp-core

      - name: Clippy
        run: cargo clippy -p chemgp-core -- -D warnings

  examples:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run examples
        run: |
          cargo run --release --example leps_minimize
          cargo run --release --example leps_dimer
          cargo run --release --example leps_neb

  rpc-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: rpc

      - name: Start LJ server
        run: pixi run -e rpc eonclient -p lj --serve-port 12345 &

      - name: Wait for server
        run: sleep 2

      - name: RPC smoke test
        run: cargo run --release --features rgpot --example rpc_smoke_test

      - name: Stop server
        run: kill %1 || true
