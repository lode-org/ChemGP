name: Documentation

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:

permissions:
  contents: write

jobs:
  build_docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v6

      - uses: prefix-dev/setup-pixi@v0.8.10
        with:
          environments: dev docs rpc

      - name: Download PET-MAD model
        run: |
          mkdir -p models
          uvx --from 'metatrain>=2026.2.1' mtt export \
            lab-cosmo/upet models/pet-mad-xs-v1.5.0.ckpt \
            -o models/pet-mad-xs-v1.5.0.pt

      - name: Start PET-MAD server
        run: |
          pixi run -e rpc eonclient -p metatomic \
            --config config/eon_serve_petmad.ini &
          SERVER_PID=$!
          
          # Wait for RPC server to be fully ready (model loaded, not just port open)
          eprintln "Waiting for RPC server on localhost:12345..."
          for i in {1..30}; do
            if timeout 2 bash -c 'echo >/dev/tcp/localhost/12345' 2>/dev/null; then
              eprintln "RPC server ready after ${i}s"
              break
            fi
            sleep 1
          done
          
          # Verify server is still running
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "RPC server failed to start"
            exit 1
          fi

      - name: Generate all figures
        run: pixi run -e dev snakemake -j4 -s scripts/figures/Snakefile --resources rpc_slot=1

      - name: Stop server
        run: kill %1 || true

      - name: Build documentation
        run: pixi run -e docs docbld

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/build

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build
          cname: chemgp.rgoswami.me
