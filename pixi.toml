[workspace]
authors = ["Rohit Goswami <rgoswami@ieee.org>"]
channels = ["conda-forge"]
name = "ChemGP"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
instantiate = { cmd = "julia --project=. -e 'using Pkg; Pkg.instantiate()'", description = "Instantiate Julia project dependencies" }
test = { cmd = "julia --project=. -e 'using Pkg; Pkg.test()'", description = "Run the Julia test suite" }
fmt = { cmd = "julia --project=. -e 'using JuliaFormatter; format(\".\")'", description = "Format all Julia files" }
gen-readme = { cmd = "emacs --batch readme_src.org --eval '(require (quote ox-md))' --eval '(org-md-export-to-markdown)' && mv readme_src.md README.md", description = "Export readme_src.org to README.md" }
lint = { cmd = "julia --project=. -e 'using JuliaFormatter; exit(format(\".\", overwrite=false) ? 0 : 1)' && uvx pre-commit run --all-files", description = "Check formatting and run all pre-commit hooks" }
pre-commit = { cmd = "uvx pre-commit run --all-files", description = "Run all pre-commit hooks" }
mlflow-ui = { cmd = "mlflow ui --host 0.0.0.0 --port 5000", description = "Start MLflow tracking UI" }

# rgpot build tasks (for RPC integration with external potentials)
rgpot-clone = { cmd = "test -d rgpot || git clone https://github.com/OmniPotentRPC/rgpot.git rgpot", description = "Clone rgpot if not already present" }
rgpot-setup = { cmd = "meson setup rgpot/builddir rgpot --wipe -Dwith_rpc=true -Dwith_tests=true -Dwith_examples=false", depends-on = ["rgpot-clone"], description = "Configure rgpot meson build with RPC support" }
rgpot-build = { cmd = "meson compile -C rgpot/builddir", depends-on = ["rgpot-setup"], description = "Build rgpot (produces potserv and libpot_client_bridge)" }
rgpot-test = { cmd = "meson test -C rgpot/builddir", depends-on = ["rgpot-build"], description = "Run rgpot test suite" }
integration-test = { cmd = "RGPOT_BUILD_DIR=rgpot/builddir julia --project=. test/test_rpc.jl", depends-on = ["rgpot-build"], description = "Run RPC integration tests against rgpot potserv" }

[dependencies]
julia = ">=1.12.2,<1.13"
mlflow = ">=2.0"
pycapnp = ">=2.0"
ase = ">=3.27.0,<4"
capnproto = ">=1.0.2,<2"
compilers = ">=1.11.0,<2"
pkgconf = ">=2.5.1,<3"
uv = ">=0.6.0"
meson = ">=1.6.0"
ninja = ">=1.12.0"
cmake = ">=3.30.0"
eigen = ">=3.4.0"
fmt = ">=11.0.0"
spdlog = ">=1.15.0"
catch2 = ">=3.7.0"
openblas = ">=0.3.28"
xtensor = ">=0.25.0"
fortran-compiler = ">=1.9.0"

[environments]
docs = { features = ["docs"] }
figures = { features = ["figures"] }

[feature.figures.dependencies]
uv = ">=0.6.0"

[feature.figures.tasks]
fig-install = { cmd = "julia --project=scripts/figures/tutorial -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'", description = "Install figure script Julia dependencies" }
fig-pyinstall = { cmd = "uv pip install -e ${RGPYCRUMBS_PATH:?Set RGPYCRUMBS_PATH}[surfaces,analysis] -e ${CHEMPARSEPLOT_PATH:?Set CHEMPARSEPLOT_PATH}[plot,neb]", description = "Install Python plotting deps (set RGPYCRUMBS_PATH, CHEMPARSEPLOT_PATH)" }
fig-mb-pes = { cmd = "julia --project=scripts/figures/tutorial scripts/figures/tutorial/mb_pes.jl", depends-on = ["fig-install"], description = "MB-1: PES contour with stationary points" }
fig-mb-neb = { cmd = "julia --project=scripts/figures/tutorial scripts/figures/tutorial/mb_neb.jl", depends-on = ["fig-install"], description = "MB-2: NEB path on Muller-Brown" }
fig-mb-gp = { cmd = "julia --project=scripts/figures/tutorial scripts/figures/tutorial/mb_gp_progression.jl", depends-on = ["fig-install"], description = "MB-3: GP surrogate progression" }
fig-mb-var = { cmd = "julia --project=scripts/figures/tutorial scripts/figures/tutorial/mb_variance.jl", depends-on = ["fig-install"], description = "MB-4: GP variance heatmap" }
fig-mb-hyp = { cmd = "julia --project=scripts/figures/tutorial scripts/figures/tutorial/mb_hyperparams.jl", depends-on = ["fig-install"], description = "MB-5: Hyperparameter sensitivity" }
fig-mb-dimer = { cmd = "julia --project=scripts/figures/tutorial scripts/figures/tutorial/mb_dimer_convergence.jl", depends-on = ["fig-install"], description = "MB-6: GP-dimer convergence" }
fig-mb-trust = { cmd = "julia --project=scripts/figures/tutorial scripts/figures/tutorial/mb_trust_region.jl", depends-on = ["fig-install"], description = "MB-7: Trust region illustration" }
fig-leps-pes = { cmd = "julia --project=scripts/figures/tutorial scripts/figures/tutorial/leps_contour.jl", depends-on = ["fig-install"], description = "LEPS-1: 2D PES contour" }
fig-leps-neb = { cmd = "julia --project=scripts/figures/tutorial scripts/figures/tutorial/leps_neb.jl", depends-on = ["fig-install"], description = "LEPS-2: NEB path on LEPS" }
fig-leps-aie = { cmd = "julia --project=scripts/figures/tutorial scripts/figures/tutorial/leps_aie_oie.jl", depends-on = ["fig-install"], description = "LEPS-3: AIE vs OIE comparison" }
fig-leps-fps = { cmd = "julia --project=scripts/figures/tutorial scripts/figures/tutorial/leps_fps.jl", depends-on = ["fig-install"], description = "LEPS-4: FPS subset selection" }
fig-hcn = { cmd = "julia --project=scripts/figures/tutorial scripts/figures/tutorial/hcn_neb_profile.jl", depends-on = ["fig-install"], description = "REAL-1: HCN energy profile" }
fig-hcn-land = { cmd = "bash scripts/figures/tutorial/hcn_landscape.sh", depends-on = ["fig-pyinstall", "fig-hcn"], description = "REAL-1B: HCN 2D landscape" }
fig-hcn-conv = { cmd = "julia --project=scripts/figures/tutorial scripts/figures/tutorial/hcn_convergence.jl", depends-on = ["fig-install"], description = "REAL-2: HCN convergence comparison" }
fig-leps-min = { cmd = "julia --project=scripts/figures/tutorial scripts/figures/tutorial/leps_minimize_convergence.jl", depends-on = ["fig-install"], description = "LEPS-5: GP-minimize convergence" }
fig-leps-rff = { cmd = "julia --project=scripts/figures/tutorial scripts/figures/tutorial/leps_rff_quality.jl", depends-on = ["fig-install"], description = "LEPS-6: RFF approximation quality" }
fig-petmad-min = { cmd = "julia --project=scripts/figures/tutorial scripts/figures/tutorial/petmad_minimize_convergence.jl", depends-on = ["fig-install"], description = "REAL-3: PET-MAD GP-minimize convergence" }
fig-petmad-rff = { cmd = "julia --project=scripts/figures/tutorial scripts/figures/tutorial/petmad_rff_quality.jl", depends-on = ["fig-install"], description = "REAL-4: PET-MAD RFF approximation quality" }
fig-rff-combined = { cmd = "julia --project=scripts/figures/tutorial scripts/figures/tutorial/rff_quality_combined.jl", depends-on = ["fig-install", "fig-leps-rff", "fig-petmad-rff"], description = "RFF-5: Combined RFF quality (LEPS + PET-MAD)" }
fig-tier1 = { depends-on = ["fig-mb-pes", "fig-mb-neb", "fig-mb-gp", "fig-mb-var", "fig-mb-hyp", "fig-leps-pes", "fig-leps-neb"], description = "Run all P1 figures (MB + LEPS, no RPC)" }
fig-tier2 = { depends-on = ["fig-mb-dimer", "fig-mb-trust", "fig-leps-aie", "fig-leps-fps", "fig-leps-min", "fig-leps-rff"], description = "Run all P2 figures (no RPC)" }

[feature.docs.dependencies]
emacs = ">=30.2,<31"

[feature.docs.tasks]
docinstall = { cmd = "julia --project=docs -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'", description = "Install documentation dependencies" }
docbld = { cmd = "julia --project=docs docs/make.jl", description = "Build documentation" }
docdel = { cmd = "rm -rf docs/build", description = "Clean documentation build" }
gen-readme = { cmd = "emacs --batch readme_src.org --eval '(require (quote ox-md))' --eval '(org-md-export-to-markdown)' && mv readme_src.md README.md", description = "Export readme_src.org to README.md" }
diagrams = { cmd = "make -C docs/src/assets/diagrams", description = "Regenerate all architecture diagrams from .dot sources" }
