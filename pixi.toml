[workspace]
authors     = ["Rohit Goswami <rgoswami[at]ieee[dot]org>"]
channels    = ["conda-forge"]
description = "GP-accelerated optimization for computational chemistry"
name        = "chemgp"
platforms   = ["linux-64"]
version     = "0.1.0"

[tasks]

[dependencies]
python = ">=3.10"
julia = ">=1.12.5,<1.13"

[feature.docs.dependencies]
nodejs = ">=22,<26"
emacs  = ">=30.2,<31"

[feature.docs.pypi-dependencies]
shibuya        = ">=2025.12.13, <2026"
sphinx         = ">=8.0, <10"
sphinx-sitemap = ">=2.9.0, <3"

[feature.docs.tasks.mkrst]
cwd = "docs"
cmd = "emacs --batch --load export.el"

[feature.docs.tasks.cpfigs]
cmd = "cp -f scripts/figures/tutorial/output/*.pdf docs/source/_static/figures/ 2>/dev/null || true"

[feature.docs.tasks.sphinxbld]
depends-on = ["mkrst", "cpfigs"]
cmd = "sphinx-build -d docs/doctrees docs/source/ docs/build"

[feature.docs.tasks.docbld]
depends-on = ["mkrst", "sphinxbld"]

[feature.docs.tasks.docdel]
cwd = "docs"
cmd = """
rm -rf build
rm -rf doctrees
rm -rf source/*.rst
"""

[feature.docs.tasks.minify]
cmd = """
npx html-minifier-terser \
  --input-dir docs/build \
  --output-dir docs/build \
  --file-ext html \
  --collapse-whitespace \
  --remove-comments \
  --minify-js true \
  --minify-css true
"""

[feature.dev.dependencies]
rust = ">=1.75"

[feature.dev.pypi-dependencies]
matplotlib = ">=3.8, <4"
h5py       = ">=3.10, <4"

[feature.dev.tasks.test]
cmd = "cargo test -p chemgp-core"

[feature.dev.tasks.build]
cmd = "cargo build --release"

[feature.dev.tasks.examples]
cmd = """
cargo run --release --example leps_minimize && \
cargo run --release --example leps_dimer && \
cargo run --release --example leps_neb && \
cargo run --release --example mb_minimize && \
cargo run --release --example mb_gp_quality && \
cargo run --release --example leps_rff_quality && \
cargo run --release --example mb_neb && \
cargo run --release --example mb_dimer && \
cargo run --release --example mb_hyperparams && \
cargo run --release --example mb_trust && \
cargo run --release --example leps_fps
"""

[feature.dev.tasks.jsonl2h5]
cmd = "python scripts/jsonl_to_h5.py"
depends-on = ["examples"]

[feature.dev.tasks.figures]
cmd = """
PROJ=scripts/figures/tutorial && \
for p in $PROJ/plotters/plot_*.jl; do \
  echo "Running $p..." && \
  julia --project=$PROJ -- "$p" || exit 1; \
done
"""
depends-on = ["jsonl2h5"]

[feature.rpc.dependencies]
eon  = ">=2.11.1,<3"
rust = ">=1.75"

[feature.rpc.pypi-dependencies]
matplotlib = ">=3.8, <4"

[feature.rpc.tasks.serve-lj]
cmd = "eonclient -p lj --serve-port 12345"

[feature.rpc.tasks.serve-petmad]
cmd = "eonclient -p metatomic --config petmad_hcn.ini --serve-port 12345"

[feature.rpc.tasks.rpc-examples]
cmd = """
TMPDIR=.cache/.tmpclaude \
cargo run --release --features rgpot --example petmad_minimize && \
cargo run --release --features io,rgpot --example hcn_neb
"""

[feature.rpc.tasks.rpc-figures]
cmd = "python scripts/plot_rpc_results.py"
depends-on = ["rpc-examples"]

[feature.rpc.tasks.rpc-smoke]
cmd = "TMPDIR=.cache/.tmpclaude cargo run --release --features rgpot --example rpc_smoke_test"

[environments]
docs = ["docs"]
dev  = ["dev"]
rpc  = ["rpc"]
