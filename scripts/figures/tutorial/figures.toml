# Batch config for ChemGP figure generation.
# Usage: rgpycrumbs chemgp plt-gp batch --config figures.toml
#
# Each [[plots]] entry maps an HDF5 input to a PDF output.
# The 'type' field selects the plt-gp subcommand.

[defaults]
input_dir = "output"
output_dir = "output"

# --- Convergence plots ---

[[plots]]
input = "leps_minimize.h5"
output = "leps_minimize_convergence.pdf"
type = "convergence"

[[plots]]
input = "petmad_minimize.h5"
output = "petmad_minimize_convergence.pdf"
type = "convergence"

[[plots]]
input = "hcn_convergence.h5"
output = "hcn_convergence.pdf"
type = "convergence"

# mb_dimer_convergence: dropped (CartesianSE toy, GP not better than classical)
# Real dimer comparisons on molecular systems: rpc_dimer (d_000 C3H5)

[[plots]]
input = "rpc_dimer.h5"
output = "rpc_dimer_convergence.pdf"
type = "convergence"

[[plots]]
input = "leps_aie_oie.h5"
output = "leps_aie_oie.pdf"
type = "convergence"

# --- Surface contour plots ---

[[plots]]
input = "leps_neb.h5"
output = "leps_neb.pdf"
type = "surface"

[[plots]]
input = "mb_neb.h5"
output = "mb_neb.pdf"
type = "surface"

# --- GP quality progression ---

[[plots]]
input = "mb_gp.h5"
output = "mb_gp_progression.pdf"
type = "quality"

[[plots]]
input = "mb_gp_scattered.h5"
output = "mb_gp_progression_scattered.pdf"
type = "quality"

# --- RFF quality ---

[[plots]]
input = "leps_rff.h5"
output = "leps_rff_quality.pdf"
type = "rff"

[[plots]]
input = "petmad_rff.h5"
output = "petmad_rff_quality.pdf"
type = "rff"

# --- NLL landscape ---

[[plots]]
input = "leps_nll.h5"
output = "leps_nll_landscape.pdf"
type = "nll"

# --- Hyperparameter sensitivity ---

[[plots]]
input = "mb_hyperparams.h5"
output = "mb_hyperparams.pdf"
type = "sensitivity"

# --- Trust region ---

[[plots]]
input = "mb_trust.h5"
output = "mb_trust_region.pdf"
type = "trust"

# --- Variance overlay ---

[[plots]]
input = "mb_variance.h5"
output = "mb_variance.pdf"
type = "variance"

# --- FPS projection ---

[[plots]]
input = "leps_fps.h5"
output = "leps_fps.pdf"
type = "fps"

# --- NEB profile ---

[[plots]]
input = "hcn_neb.h5"
output = "hcn_neb_profile.pdf"
type = "profile"

# --- NEB 2D landscapes (RMSD coordinates, via plt-neb) ---

[[plots]]
type = "landscape"
source_dir = "../../.."
dat_pattern = "hcn_neb_oie.dat"
con_pattern = "hcn_neb_path_oie.con"
output = "hcn_neb_landscape.pdf"
surface_type = "grad_imq"
landscape_mode = "surface"
plot_structures = "crit_points"
augment_dat = "hcn_neb_neb.dat"
augment_con = "hcn_neb_path_neb.con"
additional_con = [["hcn_neb_sp_neb.con", "Standard NEB"], ["hcn_neb_sp_aie.con", "GP-NEB AIE"]]
zoom_ratio = 0.3
ase_rotation = "0x,0y,0z"
height = 6.5

# --- Combined RFF (special: two inputs) ---
# This requires custom handling; the batch runner will pass
# both files via the rff subcommand with --extra-input.
# For now, generate individually and composite externally.
